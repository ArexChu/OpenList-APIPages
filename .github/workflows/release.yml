name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build-js

      - name: Build arm64 binary with Bun
        run: |
          bun build ./dist/bundle.js --compile --target=bun-linux-arm64 --outfile openlist-apipages

      - name: Test binary
        run: |
          timeout 5s ./openlist-apipages || true

      - name: Upload binary to Release
        uses: softprops/action-gh-release@v2
        with:
          files: openlist-apipages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
